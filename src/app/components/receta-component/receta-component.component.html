<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><i class="bi bi-journal-richtext me-2"></i>Recetas MealPrepU</h2>
  <!-- Botón para abrir modal de nueva receta (POST) -->
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalNuevaReceta">
    <i class="bi bi-plus-circle me-1"></i>Registrar Receta
  </button>
</div>

<!-- TABLA DE RECETAS (GET) -->
<div class="table-responsive">
  <table class="table table-striped table-sm table-hover">
    <thead class="table-success">
      <tr>
        <th scope="col">Nombre</th>
        <th scope="col">Descripción</th>
        <th scope="col">Ingredientes</th>
        <th scope="col">Tiempo (min)</th>
        <th scope="col">Categoría</th>
        <th scope="col">Editar</th>
        <th scope="col">Eliminar</th>
      </tr>
    </thead>
    <tbody>
      @for (item of recetaList; track item._id) {
        <tr>
          <td>{{ item.nombre }}</td>
          <td>{{ item.descripcion }}</td>
          <td>{{ item.ingredientes }}</td>
          <td>{{ item.tiempoPreparacion }}</td>
          <td>{{ item.categoria }}</td>
          <td>
            <button type="button" class="btn btn-warning btn-sm" (click)="toggleEditReceta(item._id)">
              <i class="bi bi-pencil-square"></i>
            </button>
          </td>
          <td>
            <button type="button" class="btn btn-danger btn-sm" (click)="deleteRecetaEntry(item._id)">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<!-- MODAL NUEVA RECETA (POST) -->
<div class="modal fade" id="modalNuevaReceta" tabindex="-1" aria-labelledby="modalNuevaRecetaLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h1 class="modal-title fs-5" id="modalNuevaRecetaLabel">
          <i class="bi bi-plus-circle me-2"></i>Nueva Receta
        </h1>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form class="card p-3" (ngSubmit)="newRecetaEntry()" [formGroup]="recetaForm">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Nombre de la receta"
              formControlName="nombre">
          </div>
          <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcion" rows="2" placeholder="Descripción breve"
              formControlName="descripcion"></textarea>
          </div>
          <div class="mb-3">
            <label for="ingredientes" class="form-label">Ingredientes</label>
            <textarea class="form-control" id="ingredientes" rows="3" placeholder="Lista de ingredientes"
              formControlName="ingredientes"></textarea>
          </div>
          <div class="mb-3">
            <label for="tiempoPreparacion" class="form-label">Tiempo de preparación (min)</label>
            <input type="number" class="form-control" id="tiempoPreparacion" placeholder="ej. 30"
              formControlName="tiempoPreparacion">
          </div>
          <div class="mb-3">
            <label for="categoria" class="form-label">Categoría</label>
            <input type="text" class="form-control" id="categoria" placeholder="ej. Desayuno, Almuerzo, Cena"
              formControlName="categoria">
          </div>
          <div class="input-group justify-content-center">
            <button type="submit" class="btn btn-success" data-bs-dismiss="modal">
              <i class="bi bi-save me-1"></i>Guardar
            </button>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<!-- FORMULARIO DE EDICIÓN (PUT) - aparece cuando editableReceta es true -->
<div *ngIf="editableReceta" class="card p-3 mt-4 border-warning">
  <h5 class="mb-3"><i class="bi bi-pencil-square me-2 text-warning"></i>Editar Receta</h5>
  <form (ngSubmit)="updateRecetaEntry()" [formGroup]="recetaForm">
    <div class="mb-3">
      <label for="edit-nombre" class="form-label">Nombre</label>
      <input type="text" class="form-control" id="edit-nombre" placeholder="Nombre de la receta"
        formControlName="nombre">
    </div>
    <div class="mb-3">
      <label for="edit-descripcion" class="form-label">Descripción</label>
      <textarea class="form-control" id="edit-descripcion" rows="2" placeholder="Descripción breve"
        formControlName="descripcion"></textarea>
    </div>
    <div class="mb-3">
      <label for="edit-ingredientes" class="form-label">Ingredientes</label>
      <textarea class="form-control" id="edit-ingredientes" rows="3" placeholder="Lista de ingredientes"
        formControlName="ingredientes"></textarea>
    </div>
    <div class="mb-3">
      <label for="edit-tiempo" class="form-label">Tiempo de preparación (min)</label>
      <input type="number" class="form-control" id="edit-tiempo" placeholder="ej. 30"
        formControlName="tiempoPreparacion">
    </div>
    <div class="mb-3">
      <label for="edit-categoria" class="form-label">Categoría</label>
      <input type="text" class="form-control" id="edit-categoria" placeholder="ej. Desayuno"
        formControlName="categoria">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-warning">
        <i class="bi bi-save me-1"></i>Actualizar
      </button>
      <button type="button" class="btn btn-secondary" (click)="editableReceta = false">
        Cancelar
      </button>
    </div>
  </form>
</div>
